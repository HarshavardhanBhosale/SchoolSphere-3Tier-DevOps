services:
  db:
    image: harshavardhan88/schooldatabase1
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: mysql123
      MYSQL_DATABASE: school
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql

  backend:
    image: harshavardhan88/schoolbackend1
    container_name: node_backend
    restart: always
    ports:
      - "3500:3500"
    environment:
     DB_HOST: db
     DB_USER: root
     DB_PASSWORD: mysql123
     DB_NAME: school
    depends_on:
      - db

  frontend:
    image: harshavardhan88/schoolfront1
    container_name: nginx_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  db_data: